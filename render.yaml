services:
  - type: web
    name: truthlens-ai-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URLS
        value: https://frontend-pied-seven-77.vercel.app,http://localhost:5173
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: API_KEY_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_BASE_URL
        value: ""
      - key: ANAKIN_API_URL
        value: https://api.anakin.io/v1/url-scraper
      - key: ANAKIN_SEARCH_URL
        value: https://api.anakin.io/v1/search
      - key: ANAKIN_USE_BROWSER
        value: true
      - key: ANAKIN_OUTPUT_FORMAT
        value: markdown
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANAKIN_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
