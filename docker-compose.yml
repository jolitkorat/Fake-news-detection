version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: truthlens-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: truthlens
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - truthlens-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/truthlens --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: truthlens-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/truthlens
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRE: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret}
      JWT_REFRESH_EXPIRE: 30d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      NEWS_API_KEY: ${NEWS_API_KEY}
      GOOGLE_FACT_CHECK_API_KEY: ${GOOGLE_FACT_CHECK_API_KEY}
      FRONTEND_URL: http://localhost
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - truthlens-net
    healthcheck:
      test: wget -qO- http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build: ./frontend
    container_name: truthlens-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - truthlens-net

volumes:
  mongo-data:
    driver: local

networks:
  truthlens-net:
    driver: bridge
